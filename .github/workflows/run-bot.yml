name: Run WG-Gesucht bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"   # every day at 08:00 UTC

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          WG_GESUCHT_USERNAME: ${{ secrets.WG_GESUCHT_USERNAME }}
          WG_GESUCHT_PASSWORD: ${{ secrets.WG_GESUCHT_PASSWORD }}
        run: python WG-Gesucht.py
